name: Node.js test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [14.x, 18.x, 20.x, 22.x, 24.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          # v6 limits automatic caching to npm; opt in explicitly to cache the global yarn cache.
          cache: yarn
      - name: Install dependencies
        # --ignore-engines is scoped to Node 14 only: the commitizen dev tool declares engines.node >=18,
        # which is irrelevant to CI/runtime but aborts the install on our oldest supported runner. Newer
        # Node versions keep strict engine checks, and this workaround disappears once Node 14 is dropped.
        run: yarn --frozen-lockfile ${{ matrix.node-version == '14.x' && '--ignore-engines' || '' }}
      - name: Run test suite
        run: yarn test
        env:
          # Set the API key for the integration tests. In the future, all tests will rely on snapshots. An API key will
          # then only be required to update those snapshots. The API key can then be removed from this file.
          API_KEY: ${{ secrets.TEST_API_KEY }}

  # Bun and Deno run the Node-oriented Jest suite unmodified, guarding the SDK's runtime-agnostic support. Dependencies
  # are installed with Node/yarn (which also builds the bundle via the `prepare` hook); only the test runtime differs.
  # Floor versions are pinned so the lowest supported runtime is exercised, not only the latest.
  test-bun:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version: ['1.0.0', 'latest']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: yarn
      - name: Install dependencies
        run: yarn --frozen-lockfile
      - name: Use Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
      - name: Run test suite on Bun
        # Explicit local jest path (not `bun x jest`, which can fetch a mismatched jest@latest when .bin/jest is absent).
        run: bun node_modules/jest/bin/jest.js
        env:
          API_KEY: ${{ secrets.TEST_API_KEY }}

  test-deno:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        deno-version: [v2.0.0, v2.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: yarn
      - name: Install dependencies
        run: yarn --frozen-lockfile
      - name: Use Deno ${{ matrix.deno-version }}
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ matrix.deno-version }}
      - name: Run test suite on Deno
        run: deno run -A --node-modules-dir=auto ./node_modules/jest/bin/jest.js
        env:
          API_KEY: ${{ secrets.TEST_API_KEY }}
